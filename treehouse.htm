<script>
  var scene,camera;
  var main = function () {
    //■シーンを作成
    scene = new THREE.Scene();

    //描画先canvasを取得
    let can=document.getElementById('can');
    //canvasの高さ,幅を取得
    let w = parseInt(can.style.width);
    let h = parseInt(can.style.height);

    //■カメラを作って設定
    //THREE.PerspectiveCamera( 画角(度), アスペクト比, カメラに写る最短距離, カメラに写る最長距離 );
    camera = new THREE.PerspectiveCamera( 30, w/h, 0.1, 10000 );
    camera.position.set( 0, 0, 1 );//カメラの位置を設定
    //カメラの向きを設定
    //camera.rotation.set(0,0,0);
    //camera.lookAt(new THREE.Vector3(0, 0, 0));
    scene.add( camera );

    //■レンダラーをDOM(canvas)上に設置する
    renderer = new THREE.WebGLRenderer({canvas:can , antialias: true});//アンチエイリアスをtureにする
    renderer.setSize( w, h );
    //シャドー(影)マップを有効にする
    //renderer.shadowMap.enabled = true;
    //シャドーマップのタイプを設定(THREE.BasicShadowMap,THREE.PCFShadowMap (default),THREE.PCFSoftShadowMap, THREE.VSMShadowMap)
    //renderer.shadowMap.type = THREE.PCFShadowMap;
    //テクスチャーなど外からはいってくるRGBは色の調整が必要になり、以下をtrueにする
    //renderer.gammaInput = true;
    //renderer.gammaOutput = true;
    renderer.setClearColor(0x444444, 1);

/*
    //■光源------------------------------------------------
    //環境光（すべての物体にすべての方向から与える光）光の当たらない部分でも真っ黒にならない
    var AmbientLight=new THREE.AmbientLight(0xffffff,0.4);
    scene.add( AmbientLight );
    //スポットライト            色,   強さ,距離,角度(angle),半影[0-1],減衰[1,1]
    const spotLight=new THREE.SpotLight(0xffffff, 2,1000,Math.PI/8, 0.4, 1);
    spotLight.position.set(100,400,300);
    spotLight.target.position.set(0,0,0);
    spotLight.castShadow=true;//影を表示可能に
    spotLight.shadow.mapSize.width = 4096;  //影をきれいにする
    spotLight.shadow.mapSize.height = 4096; //影をきれいにする
    spotLight.shadow.radius=4;  //影をぼかす（renderer.shadowMap.type=THREE.PCFShadowMapの時）
    scene.add(spotLight);
    scene.add(spotLight.target);
    //スポットライトの位置が線で表示される
    //const spotLightHelper = new THREE.SpotLightHelper(spot, 0xffffff);
    //scene.add(spotLightHelper);
*/

    //■テクスチャマッピング用画像のロードと設定
    //球体に貼り付けるテクスチャ画像のロード
    let Texture360=new THREE.TextureLoader().load('./three_r145/img/r12.png');
    Texture360.wrapS=THREE.RepeatWrapping;
    Texture360.wrapT=THREE.RepeatWrapping;
    //テクスチャの繰り返し回数を指定する
    Texture360.repeat.set(1,1);

    //球体用の基本マテリアルを作成する
    let SphereMaterial=new THREE.MeshBasicMaterial({
      color:0xFFFFFF,
      side:THREE.BackSide,//両面を表示する設定
      map: Texture360
    });

    //球体ジオメトリの作成(半径、横分割数,高さ方向分割数)
    let SphereGeometry=new THREE.SphereGeometry(1,32,24);

    //球体のメッシュの作成
    let SphereMesh=new THREE.Mesh(SphereGeometry,SphereMaterial);
    scene.add(SphereMesh);


    //マウスの左右ドラッグ＋中ボタンの上下ホイールで動かす
    const controls = new THREE.OrbitControls(camera, renderer.domElement);  
    controls.target.set(0,0,0);
    controls.enablePan=false; //パンできなくする
    controls.enableZoom=false;//ズームできなくする
    controls.update();
    renderLoop();
  };

  function renderLoop () {
    requestAnimationFrame( renderLoop );
    //スポットライトへルーパーは更新が必要
    //spotLightHelper.update();
    renderer.render( scene, camera );
  }

  window.addEventListener( 'DOMContentLoaded', main, false );
</script>

  Here is a preview of the forest floor area of Kamuda. Rotate the view with left mouse drag.
